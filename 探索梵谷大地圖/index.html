<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>探索梵谷大地圖</title>
<style>
@font-face{font-family:'ChenYuluoyan';src:url('https://github.com/Chenyu-otf/chenyuluoyan_thin/releases/download/v1.0/ChenYuluoyan-Thin.ttf') format('truetype');font-weight:normal;font-style:normal;font-display:swap}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:"ChenYuluoyan","Microsoft JhengHei",sans-serif;min-height:100vh;min-height:100dvh;color:#3b2f1e;background:#1a1a10;overflow:hidden;touch-action:manipulation}

/* ══ 封面 ══ */
#cover{position:fixed;inset:0;z-index:500;background:#000;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .8s}
#cover.hide{opacity:0;pointer-events:none}
#cover img{width:100%;height:100%;object-fit:contain}

/* ══ 大地圖 ══ */
#mapScreen{display:none;position:fixed;inset:0;z-index:1;background:#1a1a10}
#mapScreen.show{display:flex;align-items:center;justify-content:center}
.map-wrap{position:relative;width:100vw;height:100vh;height:100dvh}
#mapImg{display:block;width:100%;height:100%;object-fit:contain;pointer-events:none}

/* ══ 右上角資訊 ══ */
.hud-info{position:fixed;top:8px;right:8px;z-index:100;display:flex;align-items:center;gap:6px}
.cert-badge{background:rgba(255,248,220,.92);border:2px solid #d4a76a;border-radius:12px;padding:5px 12px;font-size:.85em;color:#5a3e1b;white-space:nowrap}
.reset-btn{padding:5px 12px;font-family:inherit;font-size:.8em;border:2px solid #c0a06a;border-radius:10px;background:rgba(255,248,220,.9);color:#7a5e3b;cursor:pointer;white-space:nowrap}
.reset-btn:active{transform:scale(.95);opacity:.7}

/* ══ 透明熱區 ══ */
.hotspot{position:absolute;transform:translate(-50%,-50%);width:80px;height:60px;cursor:pointer;border-radius:16px;transition:background .2s,box-shadow .2s;z-index:10}
.hotspot:hover,.hotspot:active{background:rgba(255,248,220,.3);box-shadow:0 0 24px rgba(255,215,0,.4)}
.hotspot .stamp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2.2em;pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));opacity:0;transition:opacity .3s}
.hotspot.done .stamp{opacity:1}

/* ══ Modal ══ */
.modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:12px}
.modal-overlay.open{display:flex}
.modal{background:#fdf6e3;border-radius:24px;padding:24px 18px;max-width:400px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.35);position:relative;max-height:85vh;overflow-y:auto}
.modal h2{text-align:center;font-size:1.4em;color:#5a3e1b;margin-bottom:12px}
.modal-close{position:absolute;top:10px;right:14px;font-size:1.5em;cursor:pointer;color:#a08a6a;border:none;background:none;padding:8px}

.slots{display:flex;justify-content:center;gap:10px;margin-bottom:16px}
.slot{width:88px;height:96px;border:3px dashed #c0a06a;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,248,220,.5);transition:all .2s}
.slot .slot-label{font-size:.72em;color:#a08a6a;margin-top:3px;text-align:center}
.slot.filled{border-style:solid;border-color:#27ae60;background:rgba(212,237,218,.4)}
.slot.wrong{animation:slotShake .4s;border-color:#e74c3c}
@keyframes slotShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

.bp-label{text-align:center;font-size:.9em;color:#7a5e3b;margin-bottom:8px}
.bp-items{display:flex;justify-content:center;gap:10px;min-height:68px;padding:10px;border:2px solid #e8d4b8;border-radius:14px;background:rgba(255,255,255,.5);flex-wrap:wrap}
.bp-badge{width:62px;height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:1.9em;border-radius:12px;border:2px solid #d4a76a;background:rgba(255,248,220,.9);cursor:grab;user-select:none;touch-action:none;transition:transform .15s}
.bp-badge:active{cursor:grabbing;transform:scale(1.12)}
.bp-badge .badge-name{font-size:.35em;color:#7a5e3b;margin-top:2px}
.bp-badge.placed{opacity:.3;pointer-events:none}

.drag-ghost{position:fixed;z-index:999;pointer-events:none;font-size:2.8em;opacity:.85;transform:translate(-50%,-50%)}

.victory-screen{display:none;position:fixed;inset:0;z-index:300;background:rgba(255,248,220,.97);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px 16px}
.victory-screen.show{display:flex}
.victory-screen h1{font-size:2em;color:#27ae60;margin-bottom:10px}
.victory-screen .time{font-size:1.1em;color:#5a3e1b;margin-bottom:18px}
.victory-screen .btn{padding:14px 36px;font-family:inherit;font-size:1.1em;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#f5c518,#e6a800);color:#5a3e1b;box-shadow:4px 4px 10px rgba(80,50,10,.2)}

@media(max-width:500px){
  .slots{gap:8px}
  .slot{width:80px;height:88px}
  .hud-info{top:6px;right:6px;gap:4px}
  .cert-badge,.reset-btn{padding:4px 8px;font-size:.78em}
}
</style>
</head>
<body>

<div id="cover"><img src="../cover.png" alt="探索梵谷"></div>

<div id="mapScreen">
  <div class="map-wrap" id="mapWrap">
    <img id="mapImg" src="../map-bg.png" alt="大地圖" draggable="false">
    <div class="hotspot" id="hs_dynasty"><div class="stamp">✅</div></div>
    <div class="hotspot" id="hs_idiom"><div class="stamp">✅</div></div>
    <div class="hotspot" id="hs_warrior"><div class="stamp">✅</div></div>
    <div class="hotspot" id="hs_gate"><div class="stamp">✅</div></div>
  </div>
  <div class="hud-info">
    <div class="cert-badge">持有 <span id="certCount">0</span> / 3</div>
    <button class="reset-btn" onclick="resetProgress()">🔄 清除</button>
  </div>
</div>

<div class="modal-overlay" id="gateModal">
  <div class="modal">
    <button class="modal-close" onclick="closeGate()">✕</button>
    <h2>🔓 解開大門</h2>
    <p style="text-align:center;font-size:.88em;color:#7a5e3b;margin-bottom:12px">把憑證拖到對應的凹槽</p>
    <div class="slots" id="slotsBox"></div>
    <div class="bp-label">🎒 背包</div>
    <div class="bp-items" id="bpBox"></div>
  </div>
</div>

<div class="victory-screen" id="victoryScreen">
  <h1>🎨 探索完成！</h1>
  <p style="font-size:1em;color:#5a3e1b;margin-bottom:8px">你已完成所有關卡，解開了梵谷的藝術密碼</p>
  <div class="time">總探索時長：<span id="victoryTime"></span></div>
  <button class="btn" onclick="resetAll()">再次探索</button>
</div>

<script>
var LEVELS = [
  { id: "dynasty", key: "cert_dynasty", link: "../畫作與時期配對/index.html", badge: "🌻", badgeName: "向日葵之印" },
  { id: "idiom",   key: "cert_idiom",   link: "../梵谷達人/index.html",      badge: "⭐", badgeName: "星星之印" },
  { id: "warrior", key: "cert_warrior", link: "../梵谷與我/index.html",       badge: "🌲", badgeName: "柏樹之印" }
];
var SLOT_IDS = ["dynasty","idiom","warrior"];
var placed = {};

var IMG_NAT_W = 1672, IMG_NAT_H = 941;

var HOTSPOTS = [
  { el: null, imgX: 0.20, imgY: 0.15, link: "../畫作與時期配對/index.html" },
  { el: null, imgX: 0.81, imgY: 0.20, link: "../梵谷達人/index.html" },
  { el: null, imgX: 0.25, imgY: 0.802, link: "../梵谷與我/index.html" },
  { el: null, imgX: 0.452, imgY: 0.622, isGate: true }
];

/* ══ 封面 ══ */
function initCover() {
  var cover = document.getElementById("cover");
  if (sessionStorage.getItem("cover_seen")) {
    cover.style.display = "none";
    showMap();
  } else {
    var dismissed = false;
    function dismiss() {
      if (dismissed) return;
      dismissed = true;
      cover.classList.add("hide");
      sessionStorage.setItem("cover_seen", "1");
      setTimeout(function() { cover.style.display = "none"; showMap(); }, 800);
    }
    cover.addEventListener("click", dismiss);
    cover.addEventListener("touchend", function(e) { e.preventDefault(); dismiss(); });
  }
}

function showMap() {
  document.getElementById("mapScreen").classList.add("show");
  refreshStatus();
  positionHotspots();
}

/* ══ 熱區定位：根據 object-fit:contain 實際圖片區域 ══ */
function positionHotspots() {
  var img = document.getElementById("mapImg");
  var wrap = document.getElementById("mapWrap");
  var nw = img.naturalWidth || IMG_NAT_W;
  var nh = img.naturalHeight || IMG_NAT_H;
  var wrapW = wrap.clientWidth || window.innerWidth;
  var wrapH = wrap.clientHeight || window.innerHeight;
  var aspect = nw / nh;
  var cAspect = wrapW / wrapH;
  var imgW, imgH, imgX, imgY;
  if (cAspect > aspect) {
    imgH = wrapH; imgW = wrapH * aspect;
    imgX = (wrapW - imgW) / 2; imgY = 0;
  } else {
    imgW = wrapW; imgH = wrapW / aspect;
    imgX = 0; imgY = (wrapH - imgH) / 2;
  }
  HOTSPOTS.forEach(function(h) {
    if (!h.el) h.el = document.getElementById(h.isGate ? "hs_gate" : "hs_" + LEVELS[HOTSPOTS.indexOf(h)].id);
    h.el.style.left = (imgX + h.imgX * imgW) + "px";
    h.el.style.top  = (imgY + h.imgY * imgH) + "px";
  });
}

/* ══ 熱區導航 ══ */
document.querySelectorAll(".hotspot").forEach(function(hs, i) {
  hs.addEventListener("click", function() {
    if (HOTSPOTS[i].isGate) { openGate(); return; }
    location.href = HOTSPOTS[i].link;
  });
  hs.addEventListener("touchend", function(e) {
    e.preventDefault();
    if (HOTSPOTS[i].isGate) { openGate(); return; }
    location.href = HOTSPOTS[i].link;
  });
});

/* ══ 狀態 ══ */
function isDone(level) { return localStorage.getItem(level.key) === "1"; }

function refreshStatus() {
  var n = 0;
  LEVELS.forEach(function(lv) {
    if (isDone(lv)) {
      n++;
      var hs = document.getElementById("hs_" + lv.id);
      if (hs) hs.classList.add("done");
    }
  });
  document.getElementById("certCount").textContent = n;
}

function resetProgress() {
  if (!confirm("確定要清除所有進度嗎？")) return;
  LEVELS.forEach(function(lv) { localStorage.removeItem(lv.key); });
  localStorage.removeItem("adventure_start");
  location.reload();
}

/* ══ Gate Modal ══ */
function openGate() {
  placed = {};
  document.getElementById("gateModal").classList.add("open");
  renderSlots();
  renderBp();
}

function closeGate() {
  document.getElementById("gateModal").classList.remove("open");
}

function renderSlots() {
  var box = document.getElementById("slotsBox");
  box.innerHTML = "";
  SLOT_IDS.forEach(function(sid) {
    var lv = LEVELS.find(function(l){return l.id===sid});
    var div = document.createElement("div");
    div.className = "slot";
    div.id = "slot_" + sid;
    div.setAttribute("data-accept", sid);
    div.innerHTML = '<span>' + lv.badge + '</span><span class="slot-label">' + lv.badgeName + '</span>';
    box.appendChild(div);
  });
}

function renderBp() {
  var box = document.getElementById("bpBox");
  box.innerHTML = "";
  LEVELS.forEach(function(lv) {
    if (!isDone(lv)) return;
    if (placed[lv.id]) return;
    var badge = document.createElement("div");
    badge.className = "bp-badge";
    badge.id = "badge_" + lv.id;
    badge.setAttribute("data-cert", lv.id);
    badge.innerHTML = lv.badge + '<span class="badge-name">' + lv.badgeName + '</span>';
    box.appendChild(badge);
    addDragListeners(badge);
  });
}

/* ══ 拖曳系統 ══ */
var dragData = null;
var ghost = null;

function addDragListeners(el) {
  el.addEventListener("mousedown", function(e) { startDrag(el, e.clientX, e.clientY); e.preventDefault(); });
  el.addEventListener("touchstart", function(e) { var t=e.touches[0]; startDrag(el, t.clientX, t.clientY); e.preventDefault(); }, {passive:false});
}

function startDrag(el, x, y) {
  dragData = el.getAttribute("data-cert");
  ghost = document.createElement("div");
  ghost.className = "drag-ghost";
  ghost.textContent = el.textContent.trim().charAt(0);
  ghost.style.left = x + "px";
  ghost.style.top = y + "px";
  document.body.appendChild(ghost);
  el.style.opacity = ".4";
}

document.addEventListener("mousemove", function(e) { moveGhost(e.clientX, e.clientY); });
document.addEventListener("touchmove", function(e) { if(ghost){var t=e.touches[0];moveGhost(t.clientX,t.clientY);e.preventDefault();} }, {passive:false});

function moveGhost(x, y) {
  if (!ghost) return;
  ghost.style.left = x + "px";
  ghost.style.top = y + "px";
}

document.addEventListener("mouseup", function(e) { endDrag(e.clientX, e.clientY); });
document.addEventListener("touchend", function(e) {
  if (!ghost) return;
  var t = e.changedTouches[0];
  endDrag(t.clientX, t.clientY);
});

function endDrag(x, y) {
  if (!ghost || !dragData) return;
  var certId = dragData;
  var badge = document.getElementById("badge_" + certId);
  ghost.remove(); ghost = null; dragData = null;
  if (badge) badge.style.opacity = "";

  var slotEl = document.elementFromPoint(x, y);
  while (slotEl && !slotEl.classList.contains("slot")) slotEl = slotEl.parentElement;
  if (!slotEl) return;

  var acceptId = slotEl.getAttribute("data-accept");
  if (certId === acceptId) {
    slotEl.classList.add("filled");
    placed[certId] = true;
    if (badge) badge.classList.add("placed");
    var lv = LEVELS.find(function(l){return l.id===certId});
    slotEl.innerHTML = '<span style="font-size:2em">' + lv.badge + '</span><span class="slot-label" style="color:#27ae60">✓</span>';
    checkAllSlots();
  } else {
    slotEl.classList.add("wrong");
    setTimeout(function(){ slotEl.classList.remove("wrong"); }, 500);
  }
}

function checkAllSlots() {
  if (SLOT_IDS.every(function(sid){ return placed[sid]; })) {
    setTimeout(showVictory, 600);
  }
}

/* ══ 通關畫面 ══ */
function checkVictory() {
  if (LEVELS.every(function(lv){ return isDone(lv); })) {
    var start = parseInt(localStorage.getItem("adventure_start") || Date.now());
    var elapsed = Math.floor((Date.now() - start) / 1000);
    document.getElementById("victoryTime").textContent = Math.floor(elapsed/60) + " 分 " + (elapsed%60) + " 秒";
    document.getElementById("victoryScreen").classList.add("show");
  }
}

function showVictory() { closeGate(); checkVictory(); }

function resetAll() {
  LEVELS.forEach(function(lv) { localStorage.removeItem(lv.key); });
  localStorage.removeItem("adventure_start");
  sessionStorage.removeItem("cover_seen");
  document.getElementById("victoryScreen").classList.remove("show");
  location.reload();
}

/* ══ 啟動 ══ */
initCover();
window.addEventListener("resize", positionHotspots);
window.addEventListener("orientationchange", function(){ setTimeout(positionHotspots, 150); });
</script>
</body>
</html>
